version: 1

workspace:
  id: tokenbar
  name: TokenBar
  path: /Users/kral/project/TokenBar
  client: local

budgets:
  daily: 6.00
  monthly: 180.00
  max_run: 1.50
  spend_today: 0.00
  spend_month: 0.00

providers:
  allowed:
    - openai
    - anthropic
    - minimax
  preferred: openai
  require_company_key: false

models:
  default: gpt-5.5
  blocked:
    - opus
    - gpt-5-pro

setup:
  source: local_agent_config
  configured_models: 13
  inferred_from:
    - /Users/kral/.codex/config.toml
    - /Users/kral/.cc-switch/cc-switch.db

rules:
  - name: Block expensive refactors on TokenBar
    when:
      intent: refactor
      estimated_cost_gt: 1.50
    decision: block
    reason: Split the refactor or use a cheaper model first.
