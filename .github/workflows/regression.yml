name: Regression Verification

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run regression scripts
        run: script/verify_regressions.sh

      - name: Build TokenBar
        run: |
          xcodebuild \
            -project TokenBar.xcodeproj \
            -scheme TokenBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
